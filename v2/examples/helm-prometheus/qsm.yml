apiVersion: "qovery.com/v2"
kind: ServiceBlueprint

metadata:
  name: "helm-prometheus"
  version: "1.0.0"
  description: "Prometheus + Grafana monitoring stack via Helm"
  icon: "https://cdn.qovery.com/icons/prometheus.svg"
  categories:
    - "monitoring"
    - "prometheus"
    - "grafana"

spec:
  provider: "helm"

  qoveryVariables:
    - name: "kubernetes_namespace"
      source: "cluster.namespace"
      overridable: true

  userVariables:
    - name: "retention_days"
      type: "number"
      required: false
      default: "15"
      description: "Prometheus data retention in days"
    - name: "storage_size_gb"
      type: "number"
      required: false
      default: "50"
      description: "Persistent volume size in GB"
    - name: "grafana_enabled"
      type: "bool"
      required: false
      default: "true"
      description: "Deploy Grafana alongside Prometheus"
    - name: "grafana_admin_password"
      type: "string"
      required: false
      default: "admin"
      description: "Grafana admin password"
      sensitive: true

  outputs:
    - name: "prometheus_url"
      description: "Prometheus server internal URL"
      sensitive: false
    - name: "grafana_url"
      description: "Grafana internal URL (empty if Grafana disabled)"
      sensitive: false
