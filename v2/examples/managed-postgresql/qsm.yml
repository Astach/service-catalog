apiVersion: "qovery.com/v2"
kind: ServiceBlueprint

metadata:
  name: "managed-postgresql"
  version: "1.0.0"
  description: "Provision a managed PostgreSQL database through Qovery with plan review before deployment"
  icon: "https://cdn.qovery.com/icons/postgresql.svg"
  categories:
    - "database"
    - "postgresql"

spec:
  provider: "qovery"

  qoveryVariables:
    - name: "qovery_environment_id"
      source: "environment.id"
      overridable: false

  userVariables:
    - name: "database_name"
      type: "string"
      required: true
      description: "Name for the database service in Qovery"
    - name: "postgresql_version"
      type: "string"
      required: false
      default: "16"
      description: "PostgreSQL engine version"
    - name: "instance_type"
      type: "string"
      required: false
      default: "db.t3.micro"
      description: "RDS instance type"
    - name: "storage_gb"
      type: "number"
      required: false
      default: "10"
      description: "Storage size in GB"
      validation:
        min: 10
        max: 65536
    - name: "accessibility"
      type: "string"
      required: false
      default: "PRIVATE"
      description: "Database network accessibility (PRIVATE or PUBLIC)"

  outputs:
    - name: "database_id"
      description: "Qovery database resource ID"
      sensitive: false
    - name: "database_internal_host"
      description: "Database internal hostname"
      sensitive: false
    - name: "database_external_host"
      description: "Database external hostname (if publicly accessible)"
      sensitive: false
    - name: "database_port"
      description: "Database port"
      sensitive: false
    - name: "database_login"
      description: "Database login"
      sensitive: false
    - name: "database_password"
      description: "Database password"
      sensitive: true
