apiVersion: qovery.com/v1
kind: ServiceBlueprint

metadata:
  name: "aws-redis"
  version: "1.0.0"
  description: "Provision an AWS ElastiCache Redis cluster with TLS, at-rest encryption, and automated snapshots"
  icon: "https://cdn.qovery.com/icons/aws-elasticache-redis.svg"

spec:
  provider: "aws"
  categories: ["cache"]
  engine: "terraform"
  engineVersionConstraint: ">= 1.5"

  injectedVariables:
    - name: "qovery_cluster_name"
      source: "cluster.name"
    - name: "region"
      source: "cluster.region"
    - name: "qovery_environment_id"
      source: "environment.id"
    - name: "qovery_project_id"
      source: "project.id"
    - name: "vpc_id"
      source: "cluster.vpc_id"
    - name: "subnet_ids"
      source: "cluster.subnet_ids"
    - name: "security_group_ids"
      source: "cluster.security_group_ids"

  userVariables:
    - name: "elasticache_identifier"
      type: "string"
      required: true
      description: "ElastiCache replication group identifier (max 40 characters)"
    - name: "auth_token"
      type: "string"
      required: true
      description: "Redis auth token (password)"
      sensitive: true
    - name: "node_type"
      type: "string"
      required: false
      default: "cache.t4g.micro"
      description: "ElastiCache node type"
      options:
        - "cache.t4g.micro"
        - "cache.t4g.small"
        - "cache.t4g.medium"
        - "cache.r6g.large"
        - "cache.r6g.xlarge"
        - "cache.r6g.2xlarge"
    - name: "elasticache_version"
      type: "string"
      required: false
      default: "7.0"
      description: "Redis engine version"
      options: ["6.2", "7.0", "7.1"]
    - name: "num_cache_clusters"
      type: "number"
      required: false
      default: "1"
      description: "Number of cache nodes in the replication group"
    - name: "encrypt_disk"
      type: "bool"
      required: false
      default: "true"
      description: "Enable at-rest encryption"
    - name: "transit_encryption_enabled"
      type: "bool"
      required: false
      default: "true"
      description: "Enable in-transit encryption (TLS)"
    - name: "snapshot_retention_limit"
      type: "number"
      required: false
      default: "14"
      description: "Number of days to retain automatic snapshots (0 to disable)"

  outputs:
    - name: "QSM_REDIS_HOST"
      description: "Primary endpoint address (read/write)"
      sensitive: false
    - name: "QSM_REDIS_PORT"
      description: "Redis port"
      sensitive: false
    - name: "QSM_REDIS_CONNECTION_STRING"
      description: "Redis connection string (without password, with TLS)"
      sensitive: false
    - name: "QSM_REDIS_READER_ENDPOINT"
      description: "Reader endpoint address (load-balanced)"
      sensitive: false
    - name: "QSM_REDIS_ARN"
      description: "ElastiCache replication group ARN"
      sensitive: false
    - name: "QSM_REDIS_ID"
      description: "ElastiCache replication group ID"
      sensitive: false
    - name: "QSM_REDIS_REPLICATION_GROUP_ID"
      description: "Replication group identifier"
      sensitive: false
    - name: "QSM_REDIS_VPC_ID"
      description: "VPC ID where ElastiCache is deployed"
      sensitive: false
    - name: "QSM_REDIS_SECURITY_GROUP_ID"
      description: "Security group ID attached to the cluster"
      sensitive: false

  dependencies: []
