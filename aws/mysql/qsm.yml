apiVersion: qovery.com/v1
kind: ServiceBlueprint

metadata:
  name: "aws-mysql"
  version: "1.0.0"
  description: "Provision an AWS RDS MySQL instance with encryption, automated backups, and enhanced monitoring"
  icon: "https://cdn.qovery.com/icons/aws-rds-mysql.svg"
  tags:
    - "database"
    - "mysql"
    - "rds"
    - "relational"

spec:
  provider: "aws"
  category: "database"
  engine: "terraform"
  engineVersionConstraint: ">= 1.5"

  injectedVariables:
    - name: "qovery_cluster_name"
      source: "cluster.name"
    - name: "region"
      source: "cluster.region"
    - name: "qovery_environment_id"
      source: "environment.id"
    - name: "qovery_project_id"
      source: "project.id"
    - name: "vpc_id"
      source: "cluster.vpc_id"
    - name: "subnet_ids"
      source: "cluster.subnet_ids"
    - name: "security_group_ids"
      source: "cluster.security_group_ids"

  userVariables:
    - name: "mysql_identifier"
      type: "string"
      required: true
      description: "Unique identifier for the RDS instance"
      uiHint: "text"
    - name: "password"
      type: "string"
      required: true
      description: "Master password (minimum 9 characters)"
      uiHint: "password"
      sensitive: true
    - name: "instance_class"
      type: "string"
      required: false
      default: "db.t3.micro"
      description: "RDS instance class"
      uiHint: "dropdown"
      options:
        - "db.t3.micro"
        - "db.t3.small"
        - "db.t3.medium"
        - "db.t3.large"
        - "db.r6g.large"
        - "db.r6g.xlarge"
        - "db.r6g.2xlarge"
    - name: "mysql_version"
      type: "string"
      required: false
      default: "8.0"
      description: "MySQL engine version"
      uiHint: "dropdown"
      options: ["5.7", "8.0"]
    - name: "disk_size"
      type: "number"
      required: false
      default: "20"
      description: "Storage size in GB"
      uiHint: "text"
    - name: "multi_az"
      type: "bool"
      required: false
      default: "true"
      description: "Deploy across multiple availability zones for high availability"
      uiHint: "toggle"
    - name: "database_name"
      type: "string"
      required: false
      default: "mysql"
      description: "Name of the default database"
      uiHint: "text"
    - name: "username"
      type: "string"
      required: false
      default: "qovery"
      description: "Master username"
      uiHint: "text"
    - name: "encrypt_disk"
      type: "bool"
      required: false
      default: "true"
      description: "Enable storage encryption at rest"
      uiHint: "toggle"
    - name: "backup_retention_period"
      type: "number"
      required: false
      default: "14"
      description: "Number of days to retain automated backups"
      uiHint: "text"
    - name: "publicly_accessible"
      type: "bool"
      required: false
      default: "false"
      description: "Make the database publicly accessible"
      uiHint: "toggle"

  outputs:
    - name: "QOVERY_MYSQL_HOST"
      description: "Database hostname"
      sensitive: false
    - name: "QOVERY_MYSQL_PORT"
      description: "Database port"
      sensitive: false
    - name: "QOVERY_MYSQL_DATABASE"
      description: "Default database name"
      sensitive: false
    - name: "QOVERY_MYSQL_USERNAME"
      description: "Master username"
      sensitive: false
    - name: "QOVERY_MYSQL_CONNECTION_STRING"
      description: "Connection string (without password)"
      sensitive: false
    - name: "QOVERY_MYSQL_ENDPOINT"
      description: "Full endpoint (host:port)"
      sensitive: false
    - name: "QOVERY_MYSQL_ARN"
      description: "RDS instance ARN"
      sensitive: false
    - name: "QOVERY_MYSQL_ID"
      description: "RDS instance ID"
      sensitive: false
    - name: "QOVERY_MYSQL_IDENTIFIER"
      description: "RDS instance identifier"
      sensitive: false
    - name: "QOVERY_MYSQL_VPC_ID"
      description: "VPC ID where the instance is deployed"
      sensitive: false
    - name: "QOVERY_MYSQL_SECURITY_GROUP_ID"
      description: "Security group ID attached to the instance"
      sensitive: false

  dependencies:
    - blueprint: "aws-secrets-manager"
      reason: "Store database credentials securely with automatic rotation"

  resources:
    defaultCpu: 500
    defaultRam: 512
    defaultTimeout: 30
