apiVersion: "qovery.com/v2"
kind: ServiceBlueprint

metadata:
  name: "aws-postgresql"
  version: "1.0.0"
  description: "Provision an AWS RDS PostgreSQL instance with encryption, automated backups, and enhanced monitoring"
  icon: "https://cdn.qovery.com/icons/aws-rds-postgresql.svg"
  categories:
    - "database"
    - "postgresql"
    - "rds"

spec:
  provider: "aws"

  qoveryVariables:
    - name: "qovery_cluster_name"
      source: "cluster.name"
      overridable: false
    - name: "region"
      source: "cluster.region"
      overridable: true
    - name: "qovery_environment_id"
      source: "environment.id"
      overridable: false
    - name: "qovery_project_id"
      source: "project.id"
      overridable: false
    - name: "vpc_id"
      source: "cluster.vpc_id"
      overridable: true
    - name: "subnet_ids"
      source: "cluster.subnet_ids"
      overridable: true
    - name: "security_group_ids"
      source: "cluster.security_group_ids"
      overridable: true

  userVariables:
    - name: "postgresql_identifier"
      type: "string"
      required: true
      description: "Unique identifier for the RDS instance"
    - name: "password"
      type: "string"
      required: true
      description: "Master password (minimum 9 characters)"
      sensitive: true
    - name: "instance_class"
      type: "string"
      required: false
      default: "db.t3.micro"
      description: "RDS instance class"
    - name: "postgresql_version"
      type: "string"
      required: false
      default: "16"
      description: "PostgreSQL engine version"
    - name: "disk_size"
      type: "number"
      required: false
      default: "20"
      description: "Storage size in GB"
    - name: "multi_az"
      type: "bool"
      required: false
      default: "true"
      description: "Deploy across multiple availability zones for high availability"
    - name: "database_name"
      type: "string"
      required: false
      default: "postgres"
      description: "Name of the default database"
    - name: "username"
      type: "string"
      required: false
      default: "qovery"
      description: "Master username"
    - name: "encrypt_disk"
      type: "bool"
      required: false
      default: "true"
      description: "Enable storage encryption at rest"
    - name: "backup_retention_period"
      type: "number"
      required: false
      default: "14"
      description: "Number of days to retain automated backups"
    - name: "publicly_accessible"
      type: "bool"
      required: false
      default: "false"
      description: "Make the database publicly accessible"

  outputs:
    - name: "postgresql_host"
      description: "Database hostname"
      sensitive: false
    - name: "postgresql_port"
      description: "Database port"
      sensitive: false
    - name: "postgresql_database"
      description: "Default database name"
      sensitive: false
    - name: "postgresql_username"
      description: "Master username"
      sensitive: false
    - name: "postgresql_connection_string"
      description: "Connection string (without password)"
      sensitive: false
    - name: "postgresql_endpoint"
      description: "Full endpoint (host:port)"
      sensitive: false
    - name: "postgresql_arn"
      description: "RDS instance ARN"
      sensitive: false
    - name: "postgresql_id"
      description: "RDS instance ID"
      sensitive: false
    - name: "postgresql_identifier"
      description: "RDS instance identifier"
      sensitive: false
    - name: "postgresql_resource_id"
      description: "RDS Resource ID (for IAM auth and CloudWatch)"
      sensitive: false
    - name: "postgresql_vpc_id"
      description: "VPC ID where the instance is deployed"
      sensitive: false
    - name: "postgresql_security_group_id"
      description: "Security group ID attached to the instance"
      sensitive: false
