syntax = "proto3";

package terraform.runner.v1;

// TerraformRunner is a plan-only gRPC service running on Qovery's infrastructure.
//
// q-core sends a blueprint reference (repo + tag + path) or pre-assembled files,
// along with variables and S3 backend configuration. The runner fetches the
// blueprint, writes tfvars, injects backend.tf, runs `terraform init` +
// `terraform plan`, and streams the diff back.
//
// Apply and destroy are handled by the engine (which runs on the customer's
// cluster and has direct access to the target cloud provider).
service TerraformRunner {
  // Plan fetches the blueprint, runs `terraform init` + `terraform plan`,
  // and streams log output followed by the plan result.
  rpc Plan(PlanRequest) returns (stream PlanEvent);
}

// ---------------------------------------------------------------------------
// Common types
// ---------------------------------------------------------------------------

// Reference to a blueprint in a public git repository.
// The runner shallow-clones the repo at the given ref and reads TF files from the subdirectory.
message BlueprintSource {
  // Git clone URL (e.g. "https://github.com/Astach/service-catalog.git").
  string repo_url = 1;
  // Git ref to checkout -- typically a tag (e.g. "aws-s3/1.0.0") or a commit SHA.
  string git_ref = 2;
  // Subdirectory within the repo containing the .tf files (e.g. "v2/examples/aws-s3").
  // If empty, the repo root is used.
  string path = 3;
}

// A single file to be written into the Terraform working directory.
// Used as a fallback when q-core sends pre-assembled files instead of a git reference.
message BlueprintFile {
  // Relative path within the working directory (e.g. "main.tf", "modules/vpc/main.tf").
  string path = 1;
  // File contents (UTF-8).
  bytes content = 2;
}

// S3 backend configuration for Terraform state storage.
// The runner generates a backend.tf from this before running `terraform init`.
// The same backend config must be used by the engine when it runs apply.
message S3BackendConfig {
  string bucket = 1;
  string key = 2;       // e.g. "catalog/{instance_id}/terraform.tfstate"
  string region = 3;
  string dynamodb_table = 4;  // optional, for state locking
  bool encrypt = 5;
}

// Environment variable injected into the Terraform process.
// Used for credential injection (AWS_ACCESS_KEY_ID, QOVERY_API_TOKEN, etc.).
message EnvVar {
  string name = 1;
  string value = 2;
  bool sensitive = 3;  // if true, value is redacted in logs
}

// ---------------------------------------------------------------------------
// Plan
// ---------------------------------------------------------------------------

message PlanRequest {
  // Unique identifier for this operation (for tracing/correlation).
  string operation_id = 1;

  // Primary: runner fetches the blueprint from a public git repo.
  BlueprintSource source = 2;

  // Fallback: q-core sends pre-assembled files directly.
  // If both source and files are provided, files takes precedence.
  repeated BlueprintFile files = 3;

  // Terraform variable values (written to terraform.tfvars.json).
  map<string, string> variables = 4;

  // S3 backend configuration -- the runner generates backend.tf from this.
  S3BackendConfig backend = 5;

  // Environment variables for the Terraform process (credentials, provider config).
  repeated EnvVar env_vars = 6;

  // Terraform version constraint (e.g. "1.9.0"). If empty, uses the bundled version.
  string terraform_version = 7;
}

// Streamed response: log lines during execution, followed by a final PlanResult.
message PlanEvent {
  oneof event {
    LogLine log = 1;
    PlanResult result = 2;
  }
}

message LogLine {
  enum Stream {
    STDOUT = 0;
    STDERR = 1;
  }
  Stream stream = 1;
  string line = 2;
}

message PlanResult {
  bool success = 1;
  string error_message = 2;

  // Raw `terraform show -json plan.bin` output.
  // q-core parses this to display the diff to the user and stores it for audit.
  bytes plan_json = 3;

  // The binary planfile (plan.bin).
  // q-core stores this and forwards it to the engine for exact `terraform apply plan.bin`.
  bytes plan_binary = 4;

  // Summary counts extracted from the plan JSON.
  int32 resources_to_add = 5;
  int32 resources_to_change = 6;
  int32 resources_to_destroy = 7;
}
